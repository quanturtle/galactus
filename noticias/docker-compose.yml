services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noticias
      POSTGRES_PASSWORD: noticias
      POSTGRES_DB: noticias
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noticias
      MINIO_ROOT_PASSWORD: noticias123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
