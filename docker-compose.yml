x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql://galactus:galactus_secret@db:5432/galactus
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    PYTHONWARNINGS: "ignore:section/key [core/sql_alchemy_conn] has been deprecated:FutureWarning"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ./src:/opt/galactus/src
    - ./noticias:/opt/galactus/noticias
    - ./supermercados:/opt/galactus/supermercados
    - ./migrations:/opt/galactus/migrations
    - ./alembic.ini:/opt/galactus/alembic.ini
    - ./pyproject.toml:/opt/galactus/pyproject.toml
    - ./requirements.txt:/opt/galactus/requirements.txt
  depends_on:
    db:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-galactus}", "-d", "${POSTGRES_DB:-galactus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: ["-c", "cd /opt/galactus && galactus migrate"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin --email admin@example.com \
          || true
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing local/${NOTICIAS_S3_BUCKET:-noticias-images} &&
        mc mb --ignore-existing local/${SUPERMERCADOS_S3_BUCKET:-supermercados-images}
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  airflow_logs:
  minio_data:
