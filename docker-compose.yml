x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql://galactus:galactus_secret@db:5432/galactus
    AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/dags
    AIRFLOW__CORE__PARALLELISM: "6"
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /home/airflow/logs
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
  volumes:
    - ./pyproject.toml:/home/airflow/galactus/pyproject.toml
    - ./uv.lock:/home/airflow/galactus/uv.lock
    - ./alembic.ini:/home/airflow/galactus/alembic.ini
    - ./galactus:/home/airflow/galactus/galactus
    - ./sql:/home/airflow/galactus/sql
    - ./migrations:/home/airflow/galactus/migrations
    - ./configs:/home/airflow/galactus/configs
    - ./airflow/dags:/home/airflow/dags
    - airflow_logs:/home/airflow/logs
  depends_on:
    db:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-galactus}", "-d", "${POSTGRES_DB:-galactus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    # one-shot: migrate the Airflow metadata DB, then create the admin user.
    # runs as the airflow user (uid 50000, inherited from x-airflow-common) so
    # the user-installed airflow package under ~/.local resolves; the
    # airflow_logs volume inherits airflow:root from the Dockerfile's
    # pre-created logs dir, so no root-side chown is needed here.
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin --email admin@example.com \
          || true
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  galactus-migrate:
    <<: *airflow-common
    entrypoint: /home/airflow/galactus/.venv/bin/alembic
    command: ["upgrade", "head"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      galactus-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      galactus-migrate:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      galactus-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  airflow_logs:
