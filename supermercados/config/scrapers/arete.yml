source: arete
home_url: https://www.arete.com.py
scrape_pattern: "-p\\d+"
max_pages: 40000
ignore_patterns:
  - /login
  - /cart
  - /account
  - /checkout
  - /register

strip_tags:
  - style
  - noscript
  - svg
  - iframe
  - link
  - nav
  - header
  - footer
strip_classes:
  - banners-simple
  - menu-top-bar-left
  - tm-related-products-carousel
strip_path_prefixes:
  - /catalogo/
  - /promociones/
