name: stock
log_level: INFO
extract:
  scraper: supermercados.stock
  base_url: https://www.stock.com.py
  allowed_domains:
  - www.stock.com.py
  scrape_patterns:
  - /products/\d+[^/]*\.aspx(?:\?|#|$)
  ignore_patterns:
  - /account\.aspx
  - /register
  - /shoppingcart
  - /login
  - /contactus
  - /AboutUs
  - /NewsArchive
  - /topic/
  - /manufacturer/
  - /search
  - /customer/
  - \?pageindex=
  - \?idFiltro=
  max_pages: -1
  concurrency: 5
  timeout_seconds: 30.0
transform:
  parser: supermercados.stock
