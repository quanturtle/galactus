name: stock
log_level: INFO
extract:
  scraper: supermercados.stock
  timeout_seconds: 30.0
  concurrency: 5
  base_url: https://www.stock.com.py
  scrape_patterns:
  - /products/\d+
  ignore_patterns:
  - /account
  - /register
  - /shoppingcart
  - /login
  - /contactus
  - /AboutUs
  - /NewsArchive
  - /topic/
  - /manufacturer/
  page_size: 0
  max_pages: -1
  allowed_domains:
  - www.stock.com.py
transform:
  parser: supermercados.stock
