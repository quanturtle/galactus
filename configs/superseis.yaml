name: superseis
log_level: INFO
extract:
  scraper: supermercados.superseis
  timeout_seconds: 30.0
  concurrency: 5
  options:
    base_url: https://www.superseis.com.py
    scrape_url_patterns:
      - "/product/"
    ignore_url_patterns:
      - /login
      - /cart
      - /account
      - /checkout
      - /register
      - /information/
      - /noticias
      - "/ofertas$"
      - "/marcas$"
      - "/sucursales$"
      - "\\?.*brands="
      - "\\?.*discounts="
      - "/product/[^/?]+/"
      - "\\?.*page="
    page_size: 0
    max_pages: 10
transform:
  parser: supermercados.superseis
  options: {}
