name: superseis
log_level: INFO
extract:
  scraper: supermercados.superseis
  base_url: https://www.superseis.com.py
  allowed_domains:
  - www.superseis.com.py
  scrape_patterns:
  - /product/[a-z0-9-]+
  ignore_patterns:
  - /login
  - /cart
  - /account
  - /checkout
  - /register
  - /information/
  - /noticias
  - /ofertas$
  - /marcas$
  - /sucursales$
  - \?.*brands=
  - \?.*discounts=
  - \?.*page=
  max_pages: -1
  concurrency: 5
  timeout_seconds: 30.0
transform:
  parser: supermercados.superseis
load:
  builder: supermercados.product
