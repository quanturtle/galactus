name: superseis
log_level: INFO
extract:
  scraper: supermercados.superseis
  timeout_seconds: 30.0
  concurrency: 5
  base_url: https://www.superseis.com.py
  scrape_patterns:
  - /product/[a-z0-9-]+
  ignore_patterns:
  - /login
  - /cart
  - /account
  - /checkout
  - /register
  - /information/
  - /noticias
  - /ofertas$
  - /marcas$
  - /sucursales$
  - \?.*brands=
  - \?.*discounts=
  - \?.*page=
  page_size: 0
  max_pages: -1
  allowed_domains:
  - www.superseis.com.py
transform:
  parser: supermercados.superseis
