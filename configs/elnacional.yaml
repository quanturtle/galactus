name: elnacional
log_level: INFO
extract:
  scraper: noticias.elnacional
  timeout_seconds: 30.0
  concurrency: 5
  options:
    base_url: https://www.elnacional.com.py
    scrape_url_patterns:
      - "-n\\d+$"
    ignore_url_patterns:
      - /tags/
      - /autor/
    page_size: 0
    max_pages: 0
transform:
  parser: noticias.elnacional
  options: {}
