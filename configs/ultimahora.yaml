name: ultimahora
bronze_table: bronze.html_snapshots
silver_table: silver.articles
log_level: INFO
extract:
  scraper: noticias.ultimahora
  concurrency: 1
  timeout_seconds: 30.0
  user_agent: "galactus/0.2 (+https://github.com/alvaro/galactus)"
  options:
    base_url: https://www.ultimahora.com
    scrape_url_patterns:
      - ".*-n[0-9]+$"
    ignore_url_patterns:
      - /anuario-
      - /brand-
      - /podcast-uh
      - /editorial-uh
      - /redaccion-uh
      - /contacto-uh
      - /codigo-etico
    page_size: 0
    max_pages: 500
    batch_size: 20
    request_delay: 0.0
transform:
  parser: noticias.ultimahora
  options: {}
