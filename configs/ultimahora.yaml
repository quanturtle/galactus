name: ultimahora
log_level: INFO
extract:
  scraper: noticias.ultimahora
  timeout_seconds: 30.0
  concurrency: 5
  base_url: https://www.ultimahora.com
  scrape_patterns:
  - ultimahora\.com/[^/]+-[^/]+-[^/]+-[^/]+
  ignore_patterns:
  - /anuario-
  - /brand-
  - /podcast-uh
  - /editorial-uh
  - /redaccion-uh
  - /contacto-uh
  - /codigo-etico
  page_size: 0
  max_pages: 10
  allowed_domains:
  - www.ultimahora.com
transform:
  parser: noticias.ultimahora
