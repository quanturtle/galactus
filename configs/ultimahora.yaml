name: ultimahora
log_level: INFO
extract:
  scraper: noticias.ultimahora
  base_url: https://www.ultimahora.com
  allowed_domains:
  - www.ultimahora.com
  scrape_patterns:
  - ultimahora\.com/[^/]+-[^/]+-[^/]+-[^/]+
  ignore_patterns:
  - /anuario-
  - /brand-
  - /podcast-uh
  - /editorial-uh
  - /redaccion-uh
  - /contacto-uh
  - /codigo-etico
  max_pages: -1
  concurrency: 3
  request_delay: 5
  timeout_seconds: 30.0
transform:
  parser: noticias.ultimahora
