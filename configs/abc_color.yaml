name: abc_color
bronze_table: bronze.api_snapshots
silver_table: silver.articles
log_level: INFO
extract:
  scraper: noticias.abc_color
  concurrency: 1
  timeout_seconds: 30.0
  user_agent: "galactus/0.2 (+https://github.com/alvaro/galactus)"
  options:
    base_url: https://www.abc.com.py
    scrape_url_patterns: []
    ignore_url_patterns: []
    page_size: 100
    max_pages: 500
    batch_size: 20
    request_delay: 0.0
transform:
  parser: noticias.abc_color
  options: {}
