name: npy
log_level: INFO
extract:
  scraper: noticias.npy
  timeout_seconds: 30.0
  concurrency: 5
  options:
    base_url: https://www.npy.com.py
    scrape_url_patterns:
      - "npy\\.com\\.py/noticias/.+/[^/]+-[^/]+-[^/]+-[^/]+"
    ignore_url_patterns: []
    page_size: 0
    max_pages: 0
transform:
  parser: noticias.npy
  options: {}
