name: arete
log_level: INFO
extract:
  scraper: supermercados.arete
  timeout_seconds: 30.0
  concurrency: 5
  options:
    base_url: https://www.arete.com.py
    scrape_url_patterns:
      - "-p\\d+"
    ignore_url_patterns:
      - /login
      - /cart
      - /account
      - /checkout
      - /register
    page_size: 0
    max_pages: 10
transform:
  parser: supermercados.arete
  options: {}
