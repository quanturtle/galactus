name: arete
log_level: INFO
extract:
  scraper: supermercados.arete
  timeout_seconds: 30.0
  concurrency: 5
  base_url: https://www.arete.com.py
  scrape_patterns:
  - -p\d+(?:/|\?|#|$)
  ignore_patterns:
  - /login
  - /cart
  - /account
  - /checkout
  - /register
  - /ingresar
  - /contacto
  - /sucursales
  - /terminos-y-condiciones
  - -c\d+\.\d+$
  - \?(map|_q|filter)=
  max_pages: -1
  allowed_domains:
  - www.arete.com.py
transform:
  parser: supermercados.arete
