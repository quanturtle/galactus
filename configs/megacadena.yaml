name: megacadena
log_level: INFO
extract:
  scraper: noticias.megacadena
  timeout_seconds: 30.0
  concurrency: 5
  params:
    per_page: "100"
    _embed: "true"
  options:
    base_url: https://megacadena.com.py/wp-json/wp/v2/posts
    scrape_url_patterns: []
    ignore_url_patterns: []
    page_size: 100
    max_pages: 0
transform:
  parser: noticias.megacadena
  options: {}
