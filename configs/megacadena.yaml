name: megacadena
log_level: INFO
extract:
  scraper: noticias.megacadena
  timeout_seconds: 30.0
  concurrency: 5
  params:
    per_page: '100'
    _embed: 'true'
    orderby: date
    order: desc
  base_url: https://megacadena.com.py/wp-json/wp/v2/posts
  scrape_patterns: []
  ignore_patterns: []
  max_pages: -1
  allowed_domains:
  - megacadena.com.py
transform:
  parser: noticias.megacadena
