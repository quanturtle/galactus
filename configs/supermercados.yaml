domain: supermercados
schema_module: galactus.domains.supermercados.schema
log_level: INFO

database:
  dsn: postgresql://galactus:galactus@localhost:5432/galactus

http:
  timeout_seconds: 30.0
  user_agent: "galactus/0.2"

sources:
  - name: biggie
    extract:
      scraper: biggie
      options:
        base_url: https://api.biggie.com.py
        page_size: 100
    transform:
      parser: biggie
      options: {}

  - name: stock
    extract:
      scraper: stock
      options:
        base_url: https://api.stock.com.py
        page_size: 100
    transform:
      parser: stock
      options: {}
