name: biggie
bronze_table: bronze.api_snapshots
silver_table: silver.products
log_level: INFO
extract:
  scraper: supermercados.biggie
  concurrency: 1
  timeout_seconds: 30.0
  user_agent: "galactus/0.2 (+https://github.com/alvaro/galactus)"
  options:
    base_url: https://api.biggie.com.py/articles
    scrape_url_patterns: []
    ignore_url_patterns: []
    page_size: 100
    max_pages: 0
transform:
  parser: supermercados.biggie
  options: {}
