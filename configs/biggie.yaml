name: biggie
log_level: INFO
extract:
  scraper: supermercados.biggie
  timeout_seconds: 30.0
  concurrency: 5
  params:
    take: "100"
  options:
    base_url: https://api.app.biggie.com.py/api/articles
    scrape_url_patterns: []
    ignore_url_patterns: []
    page_size: 100
    max_pages: 10
    request_delay: 0.5
transform:
  parser: supermercados.biggie
  options: {}
