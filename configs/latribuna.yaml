name: latribuna
log_level: INFO
extract:
  scraper: noticias.latribuna
  timeout_seconds: 30.0
  concurrency: 5
  options:
    base_url: https://www.latribuna.com.py/pf/api/v3/content/fetch/story-feed-query
    scrape_url_patterns: []
    ignore_url_patterns: []
    page_size: 100
    max_pages: 10
transform:
  parser: noticias.latribuna
  options: {}
